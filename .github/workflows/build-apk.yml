name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Generate release tag
        id: tag
        run: echo "tag=v1.0.0-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk morning-speedrun-${{ steps.tag.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Morning Speedrun ${{ steps.tag.outputs.tag }}
          body: |
            Automated debug build from commit ${{ github.sha }}.

            Download the APK below and install on your Android device.
          files: morning-speedrun-${{ steps.tag.outputs.tag }}.apk
          draft: false
          prerelease: false
